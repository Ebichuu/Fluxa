name: fluxa

services:
  fluxa:
    image: ${MCC_IMAGE:-ghcr.io/ebichuu/fluxa:v0.2}
    build: .
    container_name: fluxa
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      MCC_ENV: production
      APP_PORT: "8787"
      MCC_ACCESS_KEY: ${MCC_ACCESS_KEY:-}
      MCC_ALLOWED_ORIGINS: ${MCC_ALLOWED_ORIGINS:-}
      MCC_COOKIE_SECURE: ${MCC_COOKIE_SECURE:-}
      MCC_SUBSCRIPTION_SCHEDULER_ENABLED: "false"
      NASEMBY_CORE_WRITE_ENABLED: "false"
      MCC_PRIVATE_RSS_ENABLED: ${MCC_PRIVATE_RSS_ENABLED:-false}
      MCC_TORRA_QUALITY_WATCH_ENABLED: ${MCC_TORRA_QUALITY_WATCH_ENABLED:-false}
      MCC_TORRA_REWASH_DOWNLOAD_ENABLED: ${MCC_TORRA_REWASH_DOWNLOAD_ENABLED:-false}
      MCC_MOVIEPILOT_BACKUP_ENABLED: ${MCC_MOVIEPILOT_BACKUP_ENABLED:-false}
      MCC_PRESERVED_CORE_API_ENABLED: "false"
      MCC_INTEGRATION_PROBE_ENABLED: ${MCC_INTEGRATION_PROBE_ENABLED:-false}
      MCC_INTEGRATION_MANAGEMENT_ENABLED: ${MCC_INTEGRATION_MANAGEMENT_ENABLED:-false}
      MCC_TELEGRAM_MANAGEMENT_ENABLED: ${MCC_TELEGRAM_MANAGEMENT_ENABLED:-false}
      MCC_HDHIVE_MANAGEMENT_ENABLED: ${MCC_HDHIVE_MANAGEMENT_ENABLED:-false}
      MCC_CLOUD_SEARCH_ENABLED: ${MCC_CLOUD_SEARCH_ENABLED:-false}
      MCC_CLOUD_TRANSFER_ENABLED: ${MCC_CLOUD_TRANSFER_ENABLED:-false}
      TORRA_PUSH_ENABLED: "false"
      EMBY_BASE_URL: ${EMBY_BASE_URL:-}
      EMBY_API_KEY: ${EMBY_API_KEY:-}
      EMBY_USER_ID: ${EMBY_USER_ID:-}
      EMBY_USERNAME: ${EMBY_USERNAME:-}
      EMBY_PASSWORD: ${EMBY_PASSWORD:-}
      QB_BASE_URL: ${QB_BASE_URL:-}
      QB_USERNAME: ${QB_USERNAME:-}
      QB_PASSWORD: ${QB_PASSWORD:-}
      TORRA_BASE_URL: ${TORRA_BASE_URL:-}
      TORRA_TOKEN: ${TORRA_TOKEN:-}
      TORRA_USERNAME: ${TORRA_USERNAME:-}
      TORRA_PASSWORD: ${TORRA_PASSWORD:-}
      TORRA_DOWNLOAD_ROOT: ${TORRA_DOWNLOAD_ROOT:-/vol02/1000-4-32d3f6a0/torra}
      TORRA_DOWNLOADER_ID: ${TORRA_DOWNLOADER_ID:-}
      SYMEDIA_BASE_URL: ${SYMEDIA_BASE_URL:-}
      SYMEDIA_TOKEN: ${SYMEDIA_TOKEN:-}
      SYMEDIA_USERNAME: ${SYMEDIA_USERNAME:-}
      SYMEDIA_PASSWORD: ${SYMEDIA_PASSWORD:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_API_TOKEN: ${TMDB_API_TOKEN:-}
      ENV_115_COOKIES: ${ENV_115_COOKIES:-}
      ENV_UPLOAD_PID: ${ENV_UPLOAD_PID:-0}
      ENV_TG_PHONE: ${ENV_TG_PHONE:-}
      ENV_TG_API_ID: ${ENV_TG_API_ID:-}
      ENV_TG_API_HASH: ${ENV_TG_API_HASH:-}
      ENV_MOVIEPILOT_URL: ${ENV_MOVIEPILOT_URL:-}
      ENV_MOVIEPILOT_API_TOKEN: ${ENV_MOVIEPILOT_API_TOKEN:-}
      ENV_TORRA_AUTO_SUBSCRIBE: "0"
      ENV_MOVIEPILOT_AUTO_SUBSCRIBE: "0"
      ENV_SYMEDIA_AUTO_SUBSCRIBE: "0"
      ENV_TG_SUBSCRIPTION_NOTIFY_ENABLED: "0"
      ENV_HDHIVE_CHECKIN_ENABLED: "0"
      ENV_115_AUTO_CLASSIFY: "0"
      ENV_115_TGMONITOR_SWITCH: "0"
      ENV_PTTO115_SWITCH: "0"
      ENV_PTTO123_SWITCH: "0"
    volumes:
      - ${MCC_DATA_ROOT:-./runtime}/data:/app/data
      - ${MCC_DATA_ROOT:-./runtime}/db:/app/db
      - ${MCC_DATA_ROOT:-./runtime}/upload:/app/upload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
