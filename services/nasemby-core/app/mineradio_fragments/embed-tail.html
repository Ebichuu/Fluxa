        window.safeRenderQueuePanel('media-center-bridge-queue', { scrollCurrent: false, deferWhenHidden: false });
      }
      if (window.fx) window.fx.shelf = 'side';
      if (window.shelfManager && typeof window.shelfManager.setMode === 'function') window.shelfManager.setMode('side');
      installShelfBridge();
      if (typeof window.safeShelfRebuild === 'function') window.safeShelfRebuild('media-center-bridge-queue', true);
    }
    applySongAt(nextIndex, { silent: true, rebuildShelf: false });
    applyParentVisualFx(payload.visualFx, false);
    document.body.classList.remove('splash-active', 'empty-home-active');
    var splash = qs('splash');
    if (splash) splash.style.display = 'none';
    return true;
  }
  function flushPending() {
    if (pendingPayload) applyHomeData(pendingPayload);
  }
  window.mccMineradioBridge = {
    applyHomeData: applyHomeData,
    applyVisualFx: function(visualFx) { return applyParentVisualFx(visualFx, true); },
    flush: flushPending,
    stopAudio: stopAudio
  };
  window.MineradioAPI = {
    updateData: applyHomeData,
    updateVisualFx: function(visualFx) { return applyParentVisualFx(visualFx, true); },
    selectItem: function(index) {
      return applySongAt(bridgeLibraryCount + Math.max(0, Number(index) || 0), { silent: true, rebuildShelf: true });
    },
    selectLibrary: postLibrarySelection,
    reset: flushPending,
    destroy: stopAudio
  };
  window.addEventListener('message', function(event) {
    var data = event.data || {};
    if (data.type === 'mcc:mineradio-data') applyHomeData(data.payload);
  });
  window.addEventListener('resize', scheduleResponsiveShelfTuning);
  document.addEventListener('DOMContentLoaded', function() {
    document.documentElement.classList.add('mcc-mineradio-embed-root');
    document.body.classList.add('mcc-mineradio-embed');
    stopAudio();
    if (!readySent && window.parent) {
      readySent = true;
      window.parent.postMessage({ type: 'mineradio:ready' }, window.location.origin);
    }
  });
  window.addEventListener('load', function() {
    stopAudio();
    installVisualFxBridge();
    installFxPanelToggleBridge();
    flushPending();
    setTimeout(flushPending, 250);
    setTimeout(flushPending, 900);
  });
  setInterval(function() {
    stopAudio();
    installVisualFxBridge();
    installFxPanelToggleBridge();
    flushPending();
  }, 1800);
})();
</script>
