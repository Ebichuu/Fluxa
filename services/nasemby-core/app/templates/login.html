<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ '创建管理员' if mode == 'setup' else '登录' }} · Fluxa</title>
  <style nonce="{{ nonce }}">
    :root { color-scheme: dark; font-family: Inter, "Segoe UI", "Microsoft YaHei", sans-serif; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: #080a0e; color: #e8ecef; }
    main { width: min(100%, 380px); }
    .login-frame { padding: 28px; border: 1px solid rgba(255,255,255,.09); border-radius: 6px; background: #11151b; box-shadow: 0 22px 70px rgba(0,0,0,.38); }
    .login-status { display: flex; align-items: center; gap: 8px; margin: 0 0 22px; color: #93a7b7; font-size: 12px; }
    .login-status::before { width: 7px; height: 7px; border-radius: 50%; background: #889dad; content: ""; box-shadow: 0 0 0 4px rgba(136,157,173,.1); }
    h1 { margin: 0; font-size: 34px; font-weight: 630; line-height: 1.12; letter-spacing: 0; }
    .login-copy { margin: 10px 0 26px; color: #87919c; font-size: 13px; line-height: 1.65; }
    form { display: grid; gap: 14px; }
    label { display: grid; gap: 9px; color: #b9c1c8; font-size: 12px; }
    input { width: 100%; min-height: 46px; padding: 0 13px; border: 1px solid rgba(255,255,255,.12); border-radius: 5px; outline: 0; background: #0b0e13; color: #f5f7f8; font: inherit; }
    input:focus { border-color: #7990a4; box-shadow: 0 0 0 3px rgba(121,144,164,.14); }
    button { width: 100%; min-height: 46px; border: 1px solid #aebbc6; border-radius: 5px; background: #dce3e8; color: #10141a; font: inherit; font-weight: 700; cursor: pointer; }
    button:hover { background: #f0f3f5; }
    button:focus-visible { outline: 3px solid rgba(170,190,207,.35); outline-offset: 3px; }
    .login-error { margin: 14px 0 0; color: #f09aae; font-size: 12px; line-height: 1.5; }
    @media (max-width: 420px) { body { align-items: end; padding: 14px; } .login-frame { padding: 23px 19px; } h1 { font-size: 28px; } }
    @media (prefers-reduced-motion: reduce) { *, *::before { scroll-behavior: auto !important; transition: none !important; } }
  </style>
</head>
<body>
  <main>
    <section class="login-frame" aria-labelledby="login-title">
      <p class="login-status">{{ '首次初始化' if mode == 'setup' else '管理员访问' }}</p>
      <h1 id="login-title">{{ '创建管理员' if mode == 'setup' else '登录 Fluxa' }}</h1>
      <p class="login-copy">{{ '设置唯一管理员账号，完成后将关闭注册入口。' if mode == 'setup' else '使用管理员账号和密码继续。' }}</p>
      <form action="{{ '/auth/setup' if mode == 'setup' else '/auth/login' }}" method="post">
        <input name="next" type="hidden" value="{{ next_path }}">
        {% if mode == 'legacy' %}
          <label>访问密钥
            <input name="access_key" type="password" autocomplete="current-password" required autofocus>
          </label>
        {% else %}
          <label>管理员账号
            <input name="username" type="text" autocomplete="username" minlength="3" maxlength="32" value="{{ username }}" required autofocus>
          </label>
          <label>密码
            <input name="password" type="password" autocomplete="{{ 'new-password' if mode == 'setup' else 'current-password' }}" minlength="8" maxlength="128" required>
          </label>
          {% if mode == 'setup' %}
            <label>确认密码
              <input name="password_confirmation" type="password" autocomplete="new-password" minlength="8" maxlength="128" required>
            </label>
          {% endif %}
        {% endif %}
        <button type="submit">{{ '创建并进入' if mode == 'setup' else '进入控制中心' }}</button>
        {% if error %}<p class="login-error" role="alert">{{ error }}</p>{% endif %}
      </form>
    </section>
  </main>
</body>
</html>
