<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>makeiso v2.0 - 3D沉浸式多媒体中心</title>
  <!-- 引入原生 Tailwind CSS 与 高级无衬线字体 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* 原生 CSS 3D 矩阵支持，确保旋转时的极度顺滑与抗锯齿 */
    .stage-3d { transform-style: preserve-3d; transition: transform 0.1s ease-out; }
    .layer-3d { transform-style: preserve-3d; }
    .card-3d { transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), background 0.3s, opacity 0.5s, box-shadow 0.4s; transform-style: preserve-3d; }
  </style>
</head>
<body class="bg-[#040406] text-white overflow-hidden select-none">

  <!-- 顶部中键交互提示 -->
  <div class="absolute top-5 left-1/2 -translate-x-1/2 text-[11px] text-white/20 tracking-[0.25em] bg-white/[0.01] px-4 py-1.5 rounded-full pointer-events-none z-50 border border-white/[0.03]">
    传统正视进场 · 按住【鼠标中键】拖拽可自由旋转 3D 空间[cite: 4]
  </div>

  <div class="w-full flex relative" style="perspective: 1600px; height: 100vh;">
    
    <!-- ========================================== -->
    <!-- 1. 左侧电影控制台（悬浮抽屉态，支持完全合闭不影响全局）[cite: 4] -->
    <!-- ========================================== -->
    <div id="leftSidebar" class="absolute left-0 top-0 bottom-0 w-[300px] h-full bg-[#0a0a0f]/65 backdrop-blur-[40px] border-r border-white/[0.05] z-50 flex flex-col transition-transform duration-400 ease-[cubic-bezier(0.25,1,0.5,1)] -translate-x-[288px] hover:translate-x-0">
      <div class="p-6 pb-3 text-[11px] font-semibold text-white/30 tracking-[0.15em] flex justify-between items-center uppercase">
        <span>Playlist / 影片队列</span>
        <button id="pinBtn" class="bg-white/5 border border-white/10 text-white/40 rounded-xl px-3 py-0.5 text-[11px] cursor-pointer transition-all duration-200">自动隐藏</button>
      </div>
      <div id="movieList" class="flex-1 overflow-y-auto px-4 pb-5 flex flex-col gap-1.5 [&::-webkit-scrollbar]:w-0">
        <!-- JS 动态注入 -->
      </div>
    </div>
    
    <!-- 独立于控制台的常驻切换按钮[cite: 4] -->
    <button id="toggleBtn" class="absolute left-0 top-[25px] w-10 h-40 bg-[#0f0f16]/70 border border-white/5 border-l-0 rounded-r-xl text-white/40 text-base cursor-pointer flex items-center justify-center backdrop-blur-md transition-all duration-300 z-[49] hover:bg-white/10 hover:text-[#008cff]">▶</button>


    <!-- ========================================== -->
    <!-- 2. 🛸 全屏 3D 舞台（中央点阵画布 + 右侧高精卡片面板）[cite: 4] -->
    <!-- ========================================== -->
    <div id="stage3D" class="stage-3d absolute top-0 left-0 w-full h-full flex items-center justify-between px-[6%] box-border z-10 transform rotateX(0deg) rotateY(0deg)">
      
      <!-- 中央点阵海报墙画布 -->
      <div class="layer-3d flex-1 h-full relative">
        <canvas id="matrix-canvas" class="w-full h-full"></canvas>
      </div>

      <!-- 右侧媒体库：完全还原截图里的高保真面板与 3D 悬浮视差[cite: 4] -->
      <div class="layer-3d w-[400px] h-[75vh] flex flex-col pl-5 pointer-events-none" style="transform: translateZ(140px);">
        <div class="text-[11px] text-white/40 mb-4 tracking-[0.1em] font-semibold uppercase">Media Centers</div>
        <div id="libCardStack" class="layer-3d flex-1 flex flex-col justify-center relative">
          <!-- JS 动态高精度交错注入 -->
        </div>
      </div>

    </div>


    <!-- ========================================== -->
    <!-- 3. 2D 顶层固定控制舱 -->
    <!-- ========================================== -->
    <div class="absolute bottom-9 left-1/2 -translate-x-1/2 w-[50%] min-w-[540px] h-16 bg-[#0a0a0e]/45 backdrop-blur-[35px] border border-white/5 rounded-[32px] flex items-center justify-between px-8 box-border shadow-[0_30px_60px_rgba(0,0,0,0.8)] z-[200]">
      <div class="flex flex-col gap-0.5">
        <div id="barTitle" class="text-[15px] font-semibold text-white/90 tracking-wide">载入中...</div>
        <div id="barMeta" class="text-[12px] text-white/30 tracking-wider">---</div>
      </div>
      <div class="player-ctrls flex gap-6">
        <button class="player-btn text-xl text-white/50 hover:text-white transition-opacity duration-200" id="btnPrev">⏮</button>
        <button class="player-btn text-2xl text-white/90 hover:text-white transition-opacity duration-200">▶</button>
        <button class="player-btn text-xl text-white/50 hover:text-white transition-opacity duration-200" id="btnNext">⏭</button>
      </div>
      <div id="barTime" class="text-[13px] text-white/30 font-mono">00:00 / 00:00</div>
    </div>

  </div>

  <!-- ========================================== -->
  <!-- ⚡ 核心逻辑控制代码 -->
  <!-- ========================================== -->
  <script>
    // 配合 Flask 注入的 Emby 媒体库数据标准模型[cite: 4]
    const embyServer = "{{ emby_server_url }}"; 
    
    const embyMediaItems = [
      {
        id: "10243",
        title: "星际穿越 / Interstellar",
        year: "2014",
        meta: "4K REMUX · 杜比视界 · TrueHD 7.1",
        poster: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=500&q=80",
        libTitle: "我的电影库",
        subtitle: "Ebichuuuuu精选的原盘",
        stats: "NE · 805 部影片 · 播放 1653"
      },
      {
        id: "14552",
        title: "银翼杀手 2049",
        year: "2017",
        meta: "4K UHD · HDR10 · ATMOS全景声",
        poster: "https://images.unsplash.com/photo-1542838132-92c53300491e?w=500&q=80",
        libTitle: "赛博朋克收藏集",
        subtitle: "Ebichuuuuu的深夜影院",
        stats: "NE · 128 部影片 · 播放 942"
      },
      {
        id: "18994",
        title: "沙丘：第二部 / Dune II",
        year: "2024",
        meta: "IMAX独占画幅 · DTS-HD · 原码",
        poster: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500&q=80",
        libName: "发烧级动作影卷",
        libTitle: "IMAX 特辑分卷",
        subtitle: "Ebichuuuuu的发烧巨作",
        stats: "NE · 64 部影片 · 播放 411"
      }
    ];

    let activeIndex = 0;
    let isPinned = false;

    const leftSidebar = document.getElementById('leftSidebar');
    const pinBtn = document.getElementById('pinBtn');
    const toggleBtn = document.getElementById('toggleBtn');

    // 左侧智能双态控制
    pinBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      isPinned = !isPinned;
      if (isPinned) {
        pinBtn.innerText = "已固定";
        pinBtn.className = "bg-[#008cff]/15 border border-[#008cff]/30 text-[#008cff] rounded-xl px-3 py-0.5 text-[11px] cursor-pointer";
        leftSidebar.className = "absolute left-0 top-0 bottom-0 w-[300px] h-full bg-[#0a0a0f]/75 backdrop-blur-[40px] border-r border-white/[0.05] z-50 flex flex-col transition-transform duration-400 ease-[cubic-bezier(0.25,1,0.5,1)] translate-x-0";
        toggleBtn.classList.add('hidden');
      } else {
        pinBtn.innerText = "自动隐藏";
        pinBtn.className = "bg-white/5 border border-white/10 text-white/40 rounded-xl px-3 py-0.5 text-[11px] cursor-pointer";
        leftSidebar.className = "absolute left-0 top-0 bottom-0 w-[300px] h-full bg-[#0a0a0f]/50 backdrop-blur-[40px] border-r border-white/[0.05] z-50 flex flex-col transition-transform duration-400 ease-[cubic-bezier(0.25,1,0.5,1)] -translate-x-[288px] hover:translate-x-0";
        toggleBtn.classList.remove('hidden');
      }
    });

    toggleBtn.addEventListener('click', () => {
      leftSidebar.className = "absolute left-0 top-0 bottom-0 w-[300px] h-full bg-[#0a0a0f]/75 backdrop-blur-[40px] border-r border-white/[0.05] z-50 flex flex-col transition-transform duration-400 ease-[cubic-bezier(0.25,1,0.5,1)] translate-x-0";
      pinBtn.click();
    });

    // 动态生成页面组件
    function initDOM() {
      const movieList = document.getElementById('movieList');
      const libCardStack = document.getElementById('libCardStack');

      embyMediaItems.forEach((media, idx) => {
        // 1. 生成左侧项[cite: 4]
        const item = document.createElement('div');
        item.id = `movie-item-${idx}`;
        item.className = `movie-item flex items-center gap-3.5 p-2.5 rounded-lg cursor-pointer bg-transparent relative transition-all duration-250 ease-[cubic-bezier(0.25,1,0.5,1)] hover:scale-[1.02] hover:translate-x-1.5 hover:bg-white/5 ${idx === activeIndex ? 'bg-white/[0.07]' : ''}`;
        item.innerHTML = `
          <div class="w-9 h-12 rounded bg-cover bg-center shadow-[0_4px_10px_rgba(0,0,0,0.5)] transition-transform duration-250" style="background-image:url('${media.poster}')"></div>
          <div class="flex flex-col gap-0.5">
            <div class="text-[14px] font-medium text-white/85">${media.title.split(' / ')[0]}</div>
            <div class="text-[12px] text-white/30">${media.year}</div>
          </div>
        `;
        if(idx === activeIndex) item.style.borderLeft = "3px solid #008cff";
        item.onclick = () => selectMedia(idx);
        movieList.appendChild(item);

        // 2. 完美的 Mineradio 级别右侧高保真看板卡片[cite: 4]
        const card = document.createElement('div');
        card.id = `lib-card-${idx}`;
        card.className = "card-3d absolute w-full bg-[#101018]/45 backdrop-blur-[35px] border border-white/[0.05] rounded-2xl p-4 box-border flex gap-4 items-center shadow-[0_25px_50px_rgba(0,0,0,0.6)] pointer-events-auto cursor-pointer";
        card.innerHTML = `
          <!-- 左半边：带心形/微光叠加效果的封面 -->
          <div class="w-[90px] h-[90px] rounded-xl bg-cover bg-center shadow-[0_8px_20px_rgba(0,0,0,0.5)] flex items-center justify-center relative overflow-hidden" style="background-image:url('${media.poster}')">
             <div class="absolute inset-0 bg-black/10 backdrop-blur-[1px]"></div>
             <span class="text-white/80 text-xl z-10 filter drop-shadow-md">🤍</span>
          </div>
          <!-- 右半边：精细化文本和胶囊药丸按钮组 -->
          <div class="flex-1 flex flex-col justify-between h-[90px]">
            <div>
              <div class="text-[14px] font-semibold text-white tracking-wide">${media.libTitle}</div>
              <div class="text-[12px] text-white/60 font-medium mt-0.5">${media.subtitle}</div>
            </div>
            <div class="flex items-center justify-between mt-1">
              <div class="text-[10px] text-white/35 font-mono tracking-tight">${media.stats}</div>
              <div class="flex gap-1.5">
                <button class="text-[9px] bg-white text-black font-bold px-2.5 py-1 rounded-full shadow-md hover:scale-105 transition-transform">▶ 播放大厅</button>
                <button class="text-[9px] bg-white/10 text-white/70 font-semibold px-2.5 py-1 rounded-full hover:bg-white/20">详情</button>
              </div>
            </div>
          </div>
        `;
        card.onclick = () => selectMedia(idx);
        libCardStack.appendChild(card);
      });
      refreshCardStack();
    }

    // 3D 堆栈透视矩阵重算[cite: 4]
    function refreshCardStack() {
      embyMediaItems.forEach((_, idx) => {
        const card = document.getElementById(`lib-card-${idx}`);
        if (!card) return;

        if (idx === activeIndex) {
          card.style.transform = "translateZ(100px) translateY(-20px) scale(1.04)";
          card.style.opacity = "1";
          card.style.zIndex = "10";
          card.style.borderColor = "rgba(255, 255, 255, 0.15)";
          card.style.boxShadow = "0 35px 70px rgba(0,0,0,0.9), 0 0 40px rgba(0,140,255,0.12)";
        } else {
          card.style.borderColor = "rgba(255, 255, 255, 0.04)";
          card.style.boxShadow = "0 25px 50px rgba(0,0,0,0.6)";
          const offset = idx - activeIndex;
          if (offset === 1 || (offset === -2 && activeIndex === 2)) {
            card.style.transform = "translateZ(20px) translateY(45px) scale(0.95)";
            card.style.opacity = "0.45";
            card.style.zIndex = "2";
          } else {
            card.style.transform = "translateZ(-40px) translateY(135px) scale(0.9)";
            card.style.opacity = "0.15";
            card.style.zIndex = "1";
          }
        }
      });
    }

    function selectMedia(index) {
      activeIndex = index;
      const data = embyMediaItems[index];

      document.getElementById('barTitle').innerText = data.title;
      document.getElementById('barMeta').innerText = data.meta;
      document.getElementById('barTime').innerText = `01:${data.year.substring(2)} / 02:45`;

      embyMediaItems.forEach((_, idx) => {
        const item = document.getElementById(`movie-item-${idx}`);
        if(idx === index) {
          item.classList.add('bg-white/[0.07]');
          item.style.borderLeft = "3px solid #008cff";
        } else {
          item.classList.remove('bg-white/[0.07]');
          item.style.borderLeft = "none";
        }
      });

      refreshCardStack();
      preloadImage(data.poster);
    }

    // ==========================================
    // 🖱️ 鼠标中键 3D 随动拖拽旋转[cite: 4]
    // ==========================================
    const stage3D = document.getElementById('stage3D');
    let isDragging = false;
    let startX, startY;
    let rotateX = 0, rotateY = 0;

    window.addEventListener('mousedown', (e) => {
      if (e.button === 1) {
        e.preventDefault();
        isDragging = true;
        startX = e.clientX; startY = e.clientY;
        document.body.style.cursor = 'grabbing';
      }
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      startX = e.clientX; startY = e.clientY;

      rotateY += dx * 0.2;
      rotateX -= dy * 0.2;
      rotateX = Math.max(-20, Math.min(25, rotateX));
      rotateY = Math.max(-35, Math.min(30, rotateY));

      stage3D.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    window.addEventListener('mouseup', (e) => {
      if (e.button === 1) {
        isDragging = false;
        document.body.style.cursor = 'default';
      }
    });

    // 键盘与滚动交互
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' && activeIndex < embyMediaItems.length - 1) selectMedia(activeIndex + 1);
      if (e.key === 'ArrowUp' && activeIndex > 0) selectMedia(activeIndex - 1);
    });

    let scrollThrottle;
    window.addEventListener('wheel', (e) => {
      if (isDragging) return;
      if (scrollThrottle) return;
      scrollThrottle = setTimeout(() => { scrollThrottle = null; }, 500);
      if (e.deltaY > 0 && activeIndex < embyMediaItems.length - 1) selectMedia(activeIndex + 1);
      if (e.deltaY < 0 && activeIndex > 0) selectMedia(activeIndex - 1);
    });

    // ==========================================
    // 💎 原生 Canvas 点阵矩阵生成算法[cite: 4]
    // ==========================================
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    const sampleCanvas = document.createElement('canvas');
    const sampleCtx = sampleCanvas.getContext('2d');
    sampleCanvas.width = 120;
    sampleCanvas.height = 120;

    let activeImage = new Image();

    function resizeCanvas() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    function preloadImage(url) {
      activeImage = new Image();
      activeImage.crossOrigin = "Anonymous";
      activeImage.src = url;
    }

    function drawMatrixLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (activeImage.complete && activeImage.width > 0) {
        sampleCtx.drawImage(activeImage, 0, 0, sampleCanvas.width, sampleCanvas.height);
        const pixels = sampleCtx.getImageData(0, 0, sampleCanvas.width, sampleCanvas.height).data;

        const pitch = Math.min(canvas.width * 0.46 / sampleCanvas.width, canvas.height * 0.46 / sampleCanvas.height);
        const startX = (canvas.width - sampleCanvas.width * pitch) / 2 - 50;
        const startY = (canvas.height - sampleCanvas.height * pitch) / 2;

        for (let y = 0; y < sampleCanvas.height; y++) {
          for (let x = 0; x < sampleCanvas.width; x++) {
            const idx = (y * sampleCanvas.width + x) * 4;
            const r = pixels[idx]; const g = pixels[idx+1]; const b = pixels[idx+2];

            if (r > 35 || g > 35 || b > 35) {
              const dotX = startX + x * pitch;
              const dotY = startY + y * pitch;
              ctx.beginPath();
              ctx.arc(dotX, dotY, pitch * 0.35, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.88)`;
              ctx.fill();
            }
          }
        }
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        ctx.font = "11px monospace";
        ctx.fillText("ANALYZING EMBY POSTER MATRIX...", canvas.width/2 - 120, canvas.height/2);
      }

      let glow = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, canvas.width*0.4);
      glow.addColorStop(0, "rgba(0, 140, 255, 0.06)");
      glow.addColorStop(1, "rgba(4,4,6,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      requestAnimationFrame(drawMatrixLoop);
    }

    // 初始化运行
    initDOM();
    resizeCanvas();
    selectMedia(0);
    drawMatrixLoop();
  </script>
</body>
</html>
